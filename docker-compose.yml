version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: portal_bi_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal_bi
      POSTGRES_USER: portal_user
      POSTGRES_PASSWORD: portal_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal_user -d portal_bi"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portal_bi_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://portal_user:portal_pass@db:5432/portal_bi
    volumes:
      - uploads_data:/app/uploads
      - parquet_data:/app/data/parquet
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: portal_bi_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  parquet_data:
